# Mosaic - Netlify Functions (Hunt queue API)
# The static frontend remains GitHub Pages. v4 uses Netlify as the managed Hunt
# job queue for provisional drafts and iterations. Canonical public map data is
# still promoted only through GitHub Actions validation and committed public/data.
# Keep secrets in Netlify environment variables or seed them from GitHub Actions.

[build]
  command = "echo 'API functions only - Mosaic frontend hosted on GitHub Pages'"
  publish = "dist-placeholder"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["public/data/**", "src/types/**"]

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Mosaic-User, X-Mosaic-Hunt-Key, X-Mosaic-Service-Token"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
