name: Hunt Promotion Intake

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Promotion issue number'
        required: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  intake:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'hunt-promotion'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write promotion artifact
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const path = require('path')
            const issueNumber = context.eventName === 'workflow_dispatch'
              ? Number('${{ github.event.inputs.issue_number }}')
              : context.payload.issue.number
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            })
            const dir = path.join(process.cwd(), 'data', 'hunt-promotions')
            fs.mkdirSync(dir, { recursive: true })
            const artifact = {
              issueNumber,
              title: issue.title,
              url: issue.html_url,
              labels: issue.labels.map(label => typeof label === 'string' ? label : label.name),
              capturedAt: new Date().toISOString(),
              body: issue.body || '',
            }
            fs.writeFileSync(
              path.join(dir, `issue-${issueNumber}.json`),
              `${JSON.stringify(artifact, null, 2)}\n`,
            )

      - name: Validate current public data
        run: npm run validate-data

      - name: Open promotion review PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUMBER="${{ github.event.inputs.issue_number || github.event.issue.number }}"
          BRANCH="hunt-promotion/issue-${ISSUE_NUMBER}"
          git config user.name "Mosaic Hunt Gateway"
          git config user.email "hunt-gateway@mosaic.local"
          git checkout -b "$BRANCH"
          git add data/hunt-promotions/
          if git diff --staged --quiet; then
            echo "No promotion artifact changes to commit."
            exit 0
          fi
          git commit -m "chore(hunt): capture promotion request #${ISSUE_NUMBER}"
          git push --set-upstream origin "$BRANCH"
          gh pr create \
            --draft \
            --title "Hunt promotion review #${ISSUE_NUMBER}" \
            --body "Captures the Netlify draft Hunt promotion request from issue #${ISSUE_NUMBER}. Public map data is not promoted until a follow-up validation commit passes the quality gates."
